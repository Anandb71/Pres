# ================================================
#  PResolution — GitHub App Manifest
#  One-click app creation via /settings/apps/new
# ================================================

name: PResolution
description: "🤖 Autonomous PR Resolution Agent — AI-powered code fixes from review comments. Reply @PResolve /fix to any PR comment and watch the magic happen."
# Update this to your Render service URL after deploy:
# https://<your-service-name>.onrender.com
url: https://github.com/Anandb71/Pres
public: true

default_events:
  - issue_comment
  - pull_request
  - pull_request_review_comment

default_permissions:
  # Read PR data, diffs, comments
  pull_requests: write
  # Read & write repository content (for commits)
  contents: write
  # Read & write issue/PR comments
  issues: write
  # Read repository metadata
  metadata: read
